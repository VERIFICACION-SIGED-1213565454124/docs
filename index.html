<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Receta IMSS – Editor Word</title>
<!-- JSZip to unzip/rezip the docx -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:ital,wght@0,400;0,600;0,700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f18;--card:#131621;--border:#252a40;--accent:#3d6ef5;--green:#00c896;--text:#dde2f5;--muted:#5d6a94;--danger:#e84f6b}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 16px}
.wrap{max-width:820px;margin:0 auto}
.header{display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo-pill{background:linear-gradient(135deg,#00897b,#0097a7);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;font-weight:500;padding:7px 13px;border-radius:5px;white-space:nowrap}
.header h1{font-size:19px;font-weight:700}.header h1 em{color:var(--accent);font-style:normal}
.header p{font-size:11px;color:var(--muted);margin-top:2px}
.badge{background:rgba(0,200,150,.15);color:var(--green);font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:20px;margin-left:8px;white-space:nowrap}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:20px;margin-bottom:14px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;gap:11px;grid-template-columns:1fr 1fr}
.col-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
label.lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
label.lbl .req{color:var(--accent);margin-left:2px}
input,textarea,select{background:#0d1020;border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:9px 11px;border-radius:7px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,110,245,.15)}
textarea{resize:vertical;min-height:70px}
.med-wrap{background:#0d1020;border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:10px;position:relative;padding-top:18px}
.med-tag{position:absolute;top:-8px;left:13px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:1.5px;padding:2px 9px;border-radius:20px}
.med-rm{position:absolute;top:7px;right:9px;background:none;border:none;color:var(--danger);font-size:15px;cursor:pointer;padding:2px 5px;border-radius:4px}
.med-rm:hover{background:rgba(232,79,107,.12)}
.add-btn{width:100%;background:transparent;border:1px dashed var(--accent);color:var(--accent);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;padding:10px;border-radius:8px;cursor:pointer;transition:background .2s}
.add-btn:hover{background:rgba(61,110,245,.09)}
.actions{display:flex;gap:11px;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;padding:11px 20px;border-radius:8px;cursor:pointer}
.btn-sec:hover{border-color:var(--muted);color:var(--text)}
.btn-pri{background:linear-gradient(135deg,var(--accent),#5a3de8);border:none;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:700;padding:11px 28px;border-radius:8px;cursor:pointer;box-shadow:0 4px 18px rgba(61,110,245,.28);transition:all .2s}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(61,110,245,.4)}
.toast{position:fixed;bottom:22px;right:22px;font-weight:700;font-size:13px;padding:12px 20px;border-radius:9px;opacity:0;transform:translateY(14px);transition:all .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green);color:#0a1a15}
.toast.err{background:var(--danger);color:#fff}
@media(max-width:560px){.grid{grid-template-columns:1fr}.col-full{grid-column:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo-pill">IMSS</div>
    <div>
      <h1>Receta <em>Individual</em> <span class="badge">✦ FORMATO WORD ORIGINAL</span></h1>
      <p>Edita los campos — descarga el .docx con tu formato oficial sin alteraciones</p>
    </div>
  </div>

  <div class="card">
    <div class="sec-label">Datos del Paciente</div>
    <div class="grid">
      <div class="field"><label class="lbl">NSS<span class="req">*</span></label>
        <input id="nss" placeholder="5018-00-5148"/></div>
      <div class="field"><label class="lbl">A. MED</label>
        <input id="agmed" placeholder="1M20000R"/></div>
      <div class="field col-full"><label class="lbl">Nombre Completo<span class="req">*</span></label>
        <input id="nombre" placeholder="KEVIN ALEJANDRO RAMIREZ LARA"/></div>
      <div class="field"><label class="lbl">CURP</label>
        <input id="curp" placeholder="RALK001104HGTMRVA5" maxlength="18"/></div>
      <div class="field"><label class="lbl">Delegación</label>
        <input id="delegacion" placeholder="GUANAJUATO"/></div>
      <div class="field"><label class="lbl">Unidad</label>
        <input id="unidad" placeholder="UMF 2 IRAPUATO"/></div>
      <div class="field"><label class="lbl">CVE. Ptal.</label>
        <input id="cvePtal" placeholder="110506022151"/></div>
      <div class="field"><label class="lbl">Consultorio</label>
        <input id="consultorio" placeholder="16"/></div>
      <div class="field"><label class="lbl">Turno</label>
        <select id="turno">
          <option value="VESPERTINO">Vespertino</option>
          <option value="MATUTINO">Matutino</option>
          <option value="NOCTURNO">Nocturno</option>
        </select></div>
    </div>
  </div>

  <div class="card">
    <div class="sec-label">Receta</div>
    <div class="grid">
      <div class="field"><label class="lbl">Folio</label>
        <input id="folio" placeholder="30210101825156"/></div>
      <div class="field"><label class="lbl">Fecha<span class="req">*</span></label>
        <input id="fecha" type="date"/></div>
      <div class="field col-full"><label class="lbl">Dirección de la Clínica</label>
        <input id="direccion" placeholder="Avenida De la Reforma No. 307..."/></div>
      <div class="field"><label class="lbl">Nivel de Atención</label>
        <select id="nivel">
          <option value="Primer Nivel de Atención">Primer Nivel de Atención</option>
          <option value="Segundo Nivel de Atención">Segundo Nivel de Atención</option>
          <option value="Tercer Nivel de Atención">Tercer Nivel de Atención</option>
        </select></div>
      <div class="field"><label class="lbl">Diagnóstico</label>
        <input id="diagnostico" placeholder="amigdalitis bacteriana"/></div>
    </div>
  </div>

  <div class="card">
    <div class="sec-label">Medicamentos</div>
    <div id="meds-wrap"></div>
    <button class="add-btn" onclick="addMed()">+ Agregar Medicamento</button>
  </div>

  <div class="card">
    <div class="sec-label">Datos del Médico</div>
    <div class="grid">
      <div class="field col-full"><label class="lbl">Nombre del Médico<span class="req">*</span></label>
        <input id="medico" placeholder="JAVIER ROYVAL SOSA"/></div>
      <div class="field"><label class="lbl">Cédula Profesional</label>
        <input id="cedula" placeholder="2604831"/></div>
      <div class="field"><label class="lbl">Matrícula</label>
        <input id="matricula" placeholder="11563478"/></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-sec" onclick="resetForm()">Limpiar</button>
    <button class="btn-pri" onclick="generarDocx()">⬇ Descargar .docx</button>
  </div>
</div>
<div class="toast" id="toast"></div>

let mc = 0;
const MED_ORIGINALS = [
  "2618 LEVETIRACETAM TABLETA CADA TABLETA CONTIENE: LEVETRACETAM 1000 MG ENVASE CON 30 TABLETAS, Via de administración Oral Media (o) Tableta (s) cada 12 Hora(s) durante 30 Dia(s) Cantidad a Surtir 1 ENV.",

function addMed(val='') {
  mc++; const id = mc;
  const d = document.createElement('div');
  d.className = 'med-wrap'; d.id = `m${id}`;
  d.innerHTML = `<span class="med-tag">MED ${id}</span>
    ${id>1?`<button class="med-rm" onclick="rmMed(${id})">✕</button>`:''}
    <div class="field">
      <label class="lbl">Texto completo del medicamento<span class="req">*</span></label>
      <textarea id="mt${id}" placeholder="512 AMOXICILINA CAPSULA CONTIENE: ... 1 CAPSULA CADA 8 HRS X 7 DIAS.">${val}</textarea>
    </div>`;
  document.getElementById('meds-wrap').appendChild(d);
}
function rmMed(id) { document.getElementById(`m${id}`).remove(); }
function getMeds() {
  const r = [];
  document.querySelectorAll('.med-wrap').forEach(b => {
    const id = b.id.replace('m','');
    const t = (document.getElementById(`mt${id}`)?.value||'').trim();
    if (t) r.push(t);
  });
  return r;
}
function resetForm() {
  document.querySelectorAll('input,textarea').forEach(e=>e.value='');
  document.getElementById('meds-wrap').innerHTML=''; mc=0; addMed();
}

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'ok' : 'err');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function fmtFecha(v) {
  if (!v) return '';
  const d = new Date(v + 'T12:00:00');
  const D = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const M = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${D[d.getDay()]} ${d.getDate()} de ${M[d.getMonth()]} de ${d.getFullYear()}`;
}

// ── Escape XML special chars ──────────────────────────────────────────────────
function escXml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&apos;');
}

// ── Main generator ────────────────────────────────────────────────────────────
async function generarDocx() {
  const nombre      = document.getElementById('nombre').value.trim().toUpperCase();
  const nss         = document.getElementById('nss').value.trim();
  const agmed       = document.getElementById('agmed').value.trim();
  const curp        = document.getElementById('curp').value.trim().toUpperCase();
  const delegacion  = document.getElementById('delegacion').value.trim().toUpperCase();
  const unidad      = document.getElementById('unidad').value.trim().toUpperCase();
  const cvePtal     = document.getElementById('cvePtal').value.trim();
  const consultorio = document.getElementById('consultorio').value.trim();
  const turno       = document.getElementById('turno').value.toUpperCase();
  const folio       = document.getElementById('folio').value.trim();
  const fecha       = fmtFecha(document.getElementById('fecha').value);
  const nivel       = document.getElementById('nivel').value;
  const diagnostico = document.getElementById('diagnostico').value.trim();
  const direccion   = document.getElementById('direccion').value.trim();
  const medico      = document.getElementById('medico').value.trim().toUpperCase();
  const cedula      = document.getElementById('cedula').value.trim();
  const matricula   = document.getElementById('matricula').value.trim();
  const meds        = getMeds();

  if (!nombre) { toast('Ingresa el nombre del paciente', false); return; }
  if (!meds.length) { toast('Agrega al menos un medicamento', false); return; }

  try {
    // Decode base64 docx
    const bin = atob(DOCX_B64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

    // Load with JSZip
    const zip = await JSZip.loadAsync(bytes);
    let xml = await zip.file('word/document.xml').async('string');

    // ── Helper: replace ALL occurrences of oldVal with newVal in w:t tags ──
    function rep(oldVal, newVal) {
      // Escape for use in regex
      const escaped = oldVal.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      xml = xml.split(oldVal).join(escXml(newVal));
    }

    // ── Patient box ────────────────────────────────────────────────────────
    // NSS: field is "NSS: 5018-00-5148" as one text node
    rep('NSS: 5018-00-5148', `NSS: ${nss}`);

    // A.MED: value is " 1M20000R" (with leading space preserved)
    rep(' 1M20000R', ` ${agmed}`);

    // Nombre: has leading spaces for centering
    rep('                 KEVIN ALEJANDRO RAMIREZ LARA',
        '                 ' + nombre);

    // CURP value
    rep('RALK001104HGTMRVA5', curp);

    // DELEGACION value (has leading space)
    rep(' GUANAJUATO', ` ${delegacion}`);

    // UNIDAD value
    rep('UMF 2 IRAPUATO', unidad);

    // CVE PTAL value
    rep('110506022151', cvePtal);

    // CONSULTORIO value — comes right after "CONSULTORIO: " as separate run
    // Replace the run content that follows CONSULTORIO label
    xml = xml.replace(
      /(<w:t>CONSULTORIO: <\/w:t>[\s\S]*?<w:t>)16(<\/w:t>)/,
      `$1${escXml(consultorio)}$2`
    );

    // TURNO value
    rep('VESPERTINO', turno);

    // ── Folio ──────────────────────────────────────────────────────────────
    rep('30210101825156', folio);

    // ── Dirección ──────────────────────────────────────────────────────────
    rep('Avenida De la Reforma No. 307, Colonia Irapuato, Irapuato, Guanajuato, CP 36650.', direccion);

    // ── Fecha ──────────────────────────────────────────────────────────────
    if (fecha) rep('Miércoles 18 de febrero de 2026', fecha);

    // ── Nivel ──────────────────────────────────────────────────────────────
    // The nivel has lots of spaces before it for right-alignment
    const nivelSpaces = '                                                                                     ';
    rep(nivelSpaces + 'Primer Nivel de Atención', nivelSpaces + nivel);

    // ── Diagnóstico ────────────────────────────────────────────────────────
    // Diagnóstico is not in the original template as a separate field,
    // but Fecha paragraph has "Diagnóstico:" label — not in this docx.
    // Skip if not present.

    // ── Medicamentos ──────────────────────────────────────────────────────
    // Replace med 1 (original full text)
